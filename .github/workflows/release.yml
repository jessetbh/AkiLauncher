name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -B build-msvc -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-msvc

      - name: Package
        shell: pwsh
        run: .\tools\package.ps1 -Version ${{ github.ref_name }} -SkipBuild

      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.zip
            dist/SHA256SUMS
