name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -B build-msvc -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-msvc

      # --smoke needs a swapchain; runners are headless, so CI stops at
      # build + package. Runtime QA happens on real machines.
      - name: Package
        shell: pwsh
        run: .\tools\package.ps1 -Version ci-${{ github.sha }} -SkipBuild

      - uses: actions/upload-artifact@v4
        with:
          name: AkiLauncher-Windows
          path: dist/*.zip
